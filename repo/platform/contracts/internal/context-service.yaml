openapi: 3.0.3
info:
  title: OneLink context-service internal API (draft skeleton)
  version: 0.2.0-draft
  description: |
    不对外暴露。对齐 OneLink/docs/archive/rules-legacy-2026-05-15/Rules/15-MVP-OPENAPI-DRAFT.md §9（context-service）。
    Memory Compute Layer：extraction / distillation / context assembly。
    向量检索超时或不可用时，实现侧应降级为 working memory + 最近 summaries，跳过 persistent 向量召回（见 OneLink/docs/archive/rules-legacy-2026-05-15/Rules/19）。
    所有 `/internal/*` 路径均要求 **`x-internal-token`**，其值与 **`INTERNAL_SHARED_SECRET`** 一致。
    这是 dev-only 服务间共享口令，不是生产级服务身份方案。
    **Memory store 双模式**：未设置 **`DATABASE_URL`**（或为空）时，核心 `memory_*` / checkpoint 状态为进程内，且**不写** **`context_logs`** 表行；已设置且数据库已按草案建表时，同一套 API 读写 **Postgres**，并在每次成功的 **`POST /internal/context/build`** 上 **best-effort 追加一行 `context_logs`**（列对齐 `003_context.sql`；**不**在本 OpenAPI 响应体中返回日志 id）。服务进程**不**自动执行 DDL。
    **Policy Config Store（启动只读）**：进程启动时若存在 **`policy_configs`** 表且 SELECT 可达，只读合并 **`graph_enabled` / `rerank_enabled` / `enabled_retrieval_modes`** 等；否则用进程内默认。**optimization-layer** 主写 **`policy_*`**；本服务不主写。
    **`enabled_retrieval_modes` 的 `current_value` 解析**：合法 **JSON 字符串数组**则按数组采用；**空数组 `[]` 视为无有效覆盖**（不更新进程内允许列表，**不会**把 `[]` 当作字面量再按逗号拆分）。非 JSON 时可按逗号/空白拆分。**`graph_enabled` / `rerank_enabled`**：宽松布尔字面可解析则采用，否则跳过该键。
servers:
  - url: http://context-service.internal:8080
paths:
  /internal/context/build:
    post:
      summary: Assemble model context with token budget
      security:
        - internalToken: []
      description: |
        同步组装上下文；max_tokens / memory_limit / summary_limit 为契约必填项。
        调用方可传 `trace_id`，用于把 routing / failure 观测关联回上游 chat 请求。
        降级策略见 OneLink/docs/archive/rules-legacy-2026-05-15/Rules/19-CONTEXT-MEMORY-ARCHITECTURE.md。
        **Postgres 模式**：在返回 200 前会 **best-effort** 向 **`context_logs`** 追加一行（含 `retrieval_modes`、`token_budget_json` 等；`token_budget_json` 由上述三项 budget 字段构造以满足 DDL **NOT NULL**）。
        插入失败仅记录日志，**不**改变本接口成功响应。**In-memory 模式**不写 `context_logs`。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContextBuildRequest'
      responses:
        '200':
          description: Success (current MVP returns deterministic L1 context + route metadata)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContextBuildResponse'
        '401':
          description: Missing or invalid x-internal-token
  /internal/memory/write:
    post:
      summary: Internal memory write hook
      security:
        - internalToken: []
      description: |
        MVP 默认以事件消费写记忆为主；当前实现也支持最小 direct-internal 写入，
        会生成 artifact 与 summary，并返回真实 trace_id。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryWriteRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryWriteResponse'
        '401':
          description: Missing or invalid x-internal-token
  /internal/memory/search:
    get:
      summary: Internal memory search
      security:
        - internalToken: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Success (current MVP returns deterministic L1 matches)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemorySearchResponse'
        '401':
          description: Missing or invalid x-internal-token
  /internal/session/checkpoint:
    post:
      summary: Save runtime checkpoint
      security:
        - internalToken: []
      description: |
        对相同请求体做幂等重试：`runtime_state_blob` 与 `policy_versions`
        以 canonical JSON 参与 dedupe key 生成，重复请求返回同一 `checkpoint_id`。
        未设置 `DATABASE_URL` 时存进程内；已设置 Postgres 时存 `agent_runtime_checkpoints` 并由 `context_checkpoint_dedupe` 保持跨重启幂等（草案 SQL）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCheckpointRequest'
      responses:
        '200':
          description: Success (in-memory or Postgres per DATABASE_URL)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionCheckpointResponse'
        '401':
          description: Missing or invalid x-internal-token
  /internal/memory/consolidate:
    post:
      summary: Internal memory consolidate trigger
      security:
        - internalToken: []
      description: |
        当前 MVP 以 `event_id` 做幂等；若 `artifact_ids` 为空，或一个都解析不到有效 artifact，
        则返回 `accepted=false` 且不占用幂等索引，允许同一 `event_id` 后续带有效 `artifact_ids` 重试。
        若某次已成功写入 summary，则同一 `event_id` 的重复请求返回成功，但不重复写入新 summary。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryConsolidateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryConsolidateResponse'
        '401':
          description: Missing or invalid x-internal-token
  /internal/memory/resolve:
    post:
      summary: Resolve memory artifact payloads for downstream projection
      security:
        - internalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryResolveRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryResolveResponse'
        '401':
          description: Missing or invalid x-internal-token
  /internal/memory/forgetting/decide:
    post:
      summary: Record a selective forgetting decision (Postgres only)
      security:
        - internalToken: []
      description: |
        在 **已设置 DATABASE_URL** 且 **`forgetting_decisions`** 表已建时 **INSERT** 一行。
        **无 DATABASE_URL** 时返回 **`accepted: false`**、**`persistence: noop_no_database`**（HTTP 200）。
        调用方须保证 **`user_id`** 在 **`users`** 中存在以满足外键（smoke 使用 `INSERT … ON CONFLICT DO NOTHING`）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgettingDecideRequest'
      responses:
        '200':
          description: Success or noop_no_database
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgettingDecideResponse'
        '401':
          description: Missing or invalid x-internal-token
        '500':
          description: Insert failed
  /internal/events/receive:
    post:
      summary: Receive dev-only HTTP envelope relay events
      security:
        - internalToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventEnvelope'
      responses:
        '202':
          description: Accepted
        '401':
          description: Missing or invalid x-internal-token
  /internal/observability/asmr-lite:
    get:
      summary: ASMR-Lite observability (routing + counts; dual-mode store)
      security:
        - internalToken: []
      description: |
        返回路由累计、最近失败样本、以及与 memory store 相关的计数字段。
        **`routing.total_requests` / `l1_requests` / `l2_candidates` / `l3_candidates` / `degraded_requests` / `total_conflicts`**
        始终为**当前进程**内累加（跨重启不持久化）。
        在 **已设置 DATABASE_URL** 且已建 **`011_runtime_observability.sql`** 表时，**`routing.last_observation`**、**`recent_failures`**、根级 **`total_failures`**
        可由数据库**最新快照**覆盖（跨重启可读）；否则为进程内 runtime 池。
        `artifact_count`、`summary_count`、`entity_count`、`link_count`、`checkpoint_count` 在 **未设置 DATABASE_URL**
        时为进程内累计；在 **已设置 DATABASE_URL** 且走 Postgres 时为**数据库表行数（持久化视角）**。
        `policy_version_label` 与 `latest_summary_policy_version` 口径不变（见 schema 字段说明）。
        **`context_logs` 行不在本响应中**；Postgres 模式下由 **`POST /internal/context/build`** 侧路写入，对账需查库或跑 `scripts/smoke-chat-memory-context-log.sh`。
        Routing/failure 快照跨重启门禁见 `scripts/smoke-chat-memory-runtime-observability.sh`。
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsmrLiteObservabilityResponse'
        '401':
          description: Missing or invalid x-internal-token
components:
  securitySchemes:
    internalToken:
      type: apiKey
      in: header
      name: x-internal-token
  schemas:
    Placeholder:
      type: object
    ContextBuildRequest:
      type: object
      required:
        - user_id
        - agent_id
        - conversation_id
        - input
        - task_type
        - max_tokens
        - memory_limit
        - summary_limit
      properties:
        user_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        input:
          type: string
        task_type:
          type: string
          example: chat
        max_tokens:
          type: integer
          example: 8000
        memory_limit:
          type: integer
          example: 20
        summary_limit:
          type: integer
          example: 3
        reply_style:
          type: string
          enum:
            - brief
            - balanced
            - deep
          example: brief
        trace_id:
          type: string
          format: uuid
          nullable: true
          description: Optional upstream trace id for observability correlation
        retrieval_modes:
          type: array
          description: |
            MVP callers should use structured, semantic, temporal (OneLink/docs/archive/rules-legacy-2026-05-15/Rules-V2/00-CONSTITUTION §4.3).
            Values are filtered by the in-process PolicyConfigStore (startup merge from policy_configs when Postgres table exists; defaults otherwise). graph/rerank require policy allow-list + feature flags.
            Other values may be dropped with degraded semantics.
          items:
            type: string
    MemoryWriteRequest:
      type: object
      description: |
        MVP 以事件消费写记忆为主；当前实现支持最小 direct-internal 写入。
      required:
        - user_id
      properties:
        event_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        source_type:
          type: string
        source_service:
          type: string
        source_ref_id:
          type: string
          format: uuid
        raw_text:
          type: string
        memory_value_score:
          type: number
          description: |
            请求层统一候选分值；实现侧可把它映射到 importance_score 等内部评分字段，
            不要求与 memory_artifacts 表字段同名。
    MemoryWriteResponse:
      type: object
      required:
        - accepted
        - write_mode
        - trace_id
      properties:
        accepted:
          type: boolean
        write_mode:
          type: string
          enum:
            - direct_internal
            - noop_missing_raw_text
        trace_id:
          type: string
          format: uuid
    MemorySearchItem:
      type: object
      required:
        - memory_id
        - network_type
        - memory_level
        - content
        - confidence
        - preference_polarity
      properties:
        memory_id:
          type: string
          format: uuid
        network_type:
          type: string
        memory_level:
          type: string
          enum:
            - working
            - persistent
        content:
          type: string
        confidence:
          type: number
        preference_polarity:
          type: string
          description: Distiller-derived preference polarity on the evidence (positive | negative | neutral)
          enum:
            - positive
            - negative
            - neutral
    MemorySearchResponse:
      type: object
      required:
        - items
        - next_cursor
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MemorySearchItem'
        next_cursor:
          type: string
          nullable: true
    ContextBuildResponse:
      type: object
      required:
        - system_prompt
        - user_context
        - memory_context
        - task_context
        - selected_summary_ids
        - selected_memory_ids
        - retrieval_used
        - degraded
        - token_budget
        - compression
      properties:
        system_prompt:
          type: string
        user_context:
          type: string
        memory_context:
          type: string
          description: >
            MVP L1 证据摘要字符串；非空时可含子串 activation_top=、query_polarity_hint=、pref_top=、entity_hits= 等（与实现 format 一致，详见 OneLink/docs/archive/rules-legacy-2026-05-15/Rules-V2/CONTRACTS/context-service-contract.md）。
            query_polarity_hint 对开放式偏好问句可为 neutral（见 RoutingObservationView.query_preference_polarity）。
        task_context:
          type: string
          description: >
            路由与耗时等键值片段；含 query_preference_polarity 与 evidence_preference_polarity（positive|negative|neutral），与 GET /internal/observability/asmr-lite routing.last_observation 对齐。
            query_preference_polarity 为 L1 启发式：开放式偏好问句常映射为 neutral；嵌入「是否不喜欢」等立场时可 negative/positive（见 RoutingObservationView.query_preference_polarity）。
        selected_summary_ids:
          type: array
          items:
            type: string
            format: uuid
        selected_memory_ids:
          type: array
          items:
            type: string
            format: uuid
        retrieval_used:
          type: array
          items:
            type: string
        degraded:
          type: boolean
        token_budget:
          $ref: '#/components/schemas/TokenBudget'
        compression:
          $ref: '#/components/schemas/CompressionView'
    CompressionView:
      type: object
      required:
        - enabled
        - mode
        - quality_score
        - compression_ratio
      properties:
        enabled:
          type: boolean
          description: Whether compression evaluation was applied for this context build
        mode:
          type: string
          enum:
            - none
            - lite
            - aggressive
          description: Compression mode determined by policy gate and token budget evaluation
        quality_score:
          type: number
          description: Quality retention score (0.0–1.0) after compression evaluation
        compression_ratio:
          type: number
          description: Estimated compression ratio (0.0–1.0) if compression were applied
    SessionCheckpointRequest:
      type: object
      required:
        - agent_id
        - user_id
        - schema_version
      properties:
        agent_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        conversation_id:
          type: string
          format: uuid
        schema_version:
          type: integer
        working_summary_ref:
          type: string
          format: uuid
        runtime_state_blob:
          type: object
          additionalProperties: true
        policy_versions:
          type: object
          additionalProperties:
            type: string
    SessionCheckpointResponse:
      type: object
      required:
        - accepted
        - checkpoint_id
      properties:
        accepted:
          type: boolean
        checkpoint_id:
          type: string
          format: uuid
    MemoryConsolidateRequest:
      type: object
      required:
        - event_id
        - user_id
      properties:
        event_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        artifact_ids:
          type: array
          items:
            type: string
            format: uuid
        mode:
          type: string
          example: incremental
    MemoryConsolidateResponse:
      type: object
      required:
        - accepted
        - replayable
      properties:
        accepted:
          type: boolean
        replayable:
          type: boolean
    MemoryResolveRequest:
      type: object
      required:
        - memory_ids
      properties:
        memory_ids:
          type: array
          items:
            type: string
    MemoryResolveItem:
      type: object
      description: |
        内部解析结果；**不**声明画像事实类型——事实映射仅在 profile-service（Phase A `projection.rs`）。
        Phase A 起在原有字段外增加蒸馏元数据，供 profile 侧启发式使用。
      required:
        - memory_id
        - content
        - network_type
        - keywords
        - temporal_state
        - preference_polarity
        - source_message_id
      properties:
        memory_id:
          type: string
        content:
          type: string
        network_type:
          type: string
        keywords:
          type: array
          items:
            type: string
          description: 来自 distiller 的关键词（可为空数组）。
        temporal_state:
          type: string
          description: 时间态字符串（可为空串，与实现一致）。
        preference_polarity:
          type: string
          description: `positive` | `negative` | `neutral`（启发式）。
        source_message_id:
          type: string
          description: 溯源消息 id（dev MVP）。
    MemoryResolveResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MemoryResolveItem'
    ForgettingDecideRequest:
      type: object
      required:
        - user_id
        - target_type
        - target_id
        - decision
      properties:
        user_id:
          type: string
        target_type:
          type: string
        target_id:
          type: string
        decision:
          type: string
        reason_codes:
          description: JSON array or object; default empty if omitted
          oneOf:
            - type: array
              items: {}
            - type: object
              additionalProperties: true
        policy_version:
          type: string
          nullable: true
        cold_storage_ref:
          type: string
          nullable: true
    ForgettingDecideResponse:
      type: object
      required:
        - accepted
        - persistence
      properties:
        accepted:
          type: boolean
        persistence:
          type: string
          description: `postgres` when a row was inserted; `noop_no_database` when DATABASE_URL unset
    EventEnvelope:
      type: object
      required:
        - event_id
        - event_name
        - producer
        - payload
      properties:
        event_id:
          type: string
        event_name:
          type: string
        producer:
          type: string
        subject_id:
          type: string
          nullable: true
        trace_id:
          type: string
          nullable: true
        created_at:
          type: string
        payload:
          type: object
          additionalProperties: true
    AsmrLiteObservabilityResponse:
      type: object
      description: |
        混合视角响应：**`routing` 内聚合计数字段**（`total_requests`、`l1_requests` 等）始终为**当前进程**；
        **`routing.last_observation`、`recent_failures`、根级 `total_failures`** 在 Postgres + **`011_runtime_observability`** 时可由 DB 快照覆盖，否则为进程内。
        `artifact_count`、`summary_count`、`entity_count`、`link_count`、`checkpoint_count` 在 Postgres 模式下为 DB 聚合，
        在 in-memory 模式下为进程内 HashMap 长度。对账时请同时标明当前是否配置 DATABASE_URL 及是否应用 011。
        **`context_logs` 表行数/内容不在此对象中**；与 build 审计行对账见 DB 或专用 smoke。
      required:
        - artifact_count
        - summary_count
        - entity_count
        - link_count
        - checkpoint_count
        - total_failures
        - routing
        - policy_version_label
        - recent_failures
      properties:
        artifact_count:
          type: integer
        summary_count:
          type: integer
        entity_count:
          type: integer
        link_count:
          type: integer
        checkpoint_count:
          type: integer
        total_failures:
          type: integer
        routing:
          $ref: '#/components/schemas/RoutingMetricsView'
        policy_version_label:
          type: string
          description: Stable single-value label from PolicyConfigStore (memory_policy_version); written to new summaries
        latest_summary_policy_version:
          type: string
          nullable: true
          description: policy_version on the summary with greatest updated_at (none if no summaries)
        recent_failures:
          type: array
          items:
            $ref: '#/components/schemas/FailureCaseView'
    RoutingMetricsView:
      type: object
      required:
        - total_requests
        - l1_requests
        - l2_candidates
        - l3_candidates
        - degraded_requests
        - total_conflicts
      properties:
        total_requests:
          type: integer
        l1_requests:
          type: integer
        l2_candidates:
          type: integer
        l3_candidates:
          type: integer
        degraded_requests:
          type: integer
        total_conflicts:
          type: integer
        last_observation:
          $ref: '#/components/schemas/RoutingObservationView'
          nullable: true
    RoutingObservationView:
      type: object
      required:
        - executed_route
        - candidate_route
        - escalation_reasons
        - upgraded
        - evidence_count
        - summary_hits
        - artifact_hits
        - entity_hits
        - conflict_count
        - route_confidence
        - estimated_llm_calls
        - estimated_tokens
        - query_preview
        - degraded
        - elapsed_ms
        - query_preference_polarity
        - evidence_preference_polarity
        - retrieval_modes
      properties:
        executed_route:
          type: string
        candidate_route:
          type: string
        escalation_reasons:
          type: array
          items:
            type: string
        upgraded:
          type: boolean
        evidence_count:
          type: integer
        summary_hits:
          type: integer
        artifact_hits:
          type: integer
        entity_hits:
          type: integer
        conflict_count:
          type: integer
        route_confidence:
          type: number
          description: Deterministic MVP confidence-like signal from L1 evidence ranking
        estimated_llm_calls:
          type: integer
          description: MVP route-cost hint; current implementation records 0 for pure L1 and 1 for deferred upgrade candidates
        estimated_tokens:
          type: integer
          description: MVP token estimate derived from selected evidence text length
        query_preview:
          type: string
        degraded:
          type: boolean
        elapsed_ms:
          type: integer
        query_preference_polarity:
          type: string
          description: |
            L1 MVP heuristic: set when the query matches preference-related intent in l1_policy (e.g. 喜欢/偏好/沟通方式/讨厌).
            Open-ended preference questions (e.g. 什么样、哪种、喜欢什么…) map to neutral so the query text is not mistaken for the user's stance.
            Queries that embed an explicit stance (e.g. 是否不喜欢 X) may be negative or positive. Non-preference queries are recorded as neutral.
          enum:
            - positive
            - negative
            - neutral
        evidence_preference_polarity:
          type: string
          description: Polarity on the highest-ranked L1 evidence (neutral if none)
          enum:
            - positive
            - negative
            - neutral
        retrieval_modes:
          type: array
          description: Retrieval modes actually used after policy filtering for this context build
          items:
            type: string
    FailureCaseView:
      type: object
      required:
        - id
        - user_id
        - stage
        - category
        - detail
        - retryable
        - attempt_count
        - created_at
      properties:
        id:
          type: string
        user_id:
          type: string
        stage:
          type: string
        category:
          type: string
        detail:
          type: string
        trace_id:
          type: string
          nullable: true
        retryable:
          type: boolean
        attempt_count:
          type: integer
        created_at:
          type: string
    TokenBudget:
      type: object
      required:
        - max_tokens
        - memory_limit
        - summary_limit
      properties:
        max_tokens:
          type: integer
        memory_limit:
          type: integer
        summary_limit:
          type: integer
