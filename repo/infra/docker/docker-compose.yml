version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: onelink-postgres
    environment:
      POSTGRES_USER: onelink
      POSTGRES_PASSWORD: onelink-local-dev-password
      POSTGRES_DB: onelink
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onelink -d onelink"]
      interval: 2s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
