server {
    listen 80;
    listen [::]:80;
    server_name onelink.cool;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name onelink.cool;

    ssl_certificate /etc/letsencrypt/live/onelink.cool/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onelink.cool/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:OneLinkSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/onelink/current;
    index index.html;

    location /api/v1/bff/ {
        proxy_pass http://127.0.0.1:18121;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
